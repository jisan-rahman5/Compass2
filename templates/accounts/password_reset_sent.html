{% extends 'base.html' %}
{% block title %}Check Your Email — COMPASS{% endblock %}

{% block content %}
<div class="empty-state" style="margin-top: 10vh;">
    <div class="empty-icon" style="font-size: 2.5rem; margin-bottom: 20px;">📬</div>
    <h1 style="font-size: 1.5rem; color: var(--text); margin-bottom: 10px;">Check your email</h1>
    <p style="color: var(--text-light); margin-bottom: 30px;">
        We've sent a password reset link to your email address. Please check your inbox.
    </p>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary">Back to Login</a>
</div>
{% endblock %}
