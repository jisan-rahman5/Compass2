{% extends 'base.html' %}
{% block title %}Sign In — COMPASS{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-brand">
        <span class="brand-icon">🧭</span>
        <h1>COMPASS</h1>
        <p>Your daily direction system</p>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" class="form-control" placeholder="Your username"
                required autofocus>
        </div>

        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" class="form-control" placeholder="Your password"
                required>
        </div>

        {% if form.errors %}
        <div class="message message-error" style="margin-bottom:14px;">
            Invalid username or password.
        </div>
        {% endif %}

        <button type="submit" class="btn btn-primary">Sign in</button>
    </form>

    <div class="auth-footer">
        Don't have an account? <a href="{% url 'accounts:register' %}">Create one</a>
        &nbsp;·&nbsp; <a href="{% url 'accounts:password_reset' %}">Forgot password?</a>
    </div>
</div>
{% endblock %}
