{% extends 'base.html' %}
{% block title %}Reset Password — COMPASS{% endblock %}

{% block content %}
<div class="empty-state" style="margin-top: 10vh; max-width: 400px; margin-left: auto; margin-right: auto;">
    <div class="empty-icon" style="font-size: 2.5rem; margin-bottom: 20px;">🔑</div>
    <h1 style="font-size: 1.5rem; color: var(--text); margin-bottom: 10px;">Reset your password</h1>
    <p style="color: var(--text-light); margin-bottom: 30px;">Enter your email address and we'll send you a reset link.</p>
    <form method="post" style="width: 100%;">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_email">Email address</label>
            {{ form.email }}
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Send reset link</button>
    </form>
    <p style="color: var(--text-light); font-size: 0.85rem; margin-top: 20px;">
        <a href="{% url 'accounts:login' %}">← Back to login</a>
    </p>
</div>
{% endblock %}
