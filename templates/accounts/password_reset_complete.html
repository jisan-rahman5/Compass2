{% extends 'base.html' %}
{% block title %}Password Reset Complete — COMPASS{% endblock %}

{% block content %}
<div class="empty-state" style="margin-top: 10vh;">
    <div class="empty-icon" style="font-size: 2.5rem; margin-bottom: 20px;">✅</div>
    <h1 style="font-size: 1.5rem; color: var(--text); margin-bottom: 10px;">Password updated!</h1>
    <p style="color: var(--text-light); margin-bottom: 30px;">
        Your password has been set successfully. You can now log in with your new password.
    </p>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary">Log in now</a>
</div>
{% endblock %}
